<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F2FF" />
      <stop offset="70%" stop-color="#0066FF" />
      <stop offset="100%" stop-color="#001A33" />
    </radialGradient>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FF" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
  </defs>

  <!-- External HUD Rings -->
  <circle cx="32" cy="32" r="28" stroke="url(#ringGradient)" stroke-width="0.5" stroke-dasharray="4 2" opacity="0.3" />
  <path d="M32 4 A28 28 0 0 1 60 32" stroke="url(#ringGradient)" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)" />
  <path d="M32 60 A28 28 0 0 1 4 32" stroke="url(#ringGradient)" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)" opacity="0.6" />

  <!-- Neural Network Lines -->
  <g opacity="0.8">
    <line x1="32" y1="32" x2="48" y2="16" stroke="#00F2FF" stroke-width="0.5" />
    <line x1="32" y1="32" x2="16" y2="48" stroke="#00F2FF" stroke-width="0.5" />
    <line x1="32" y1="32" x2="52" y2="40" stroke="#7000FF" stroke-width="0.5" />
    <line x1="32" y1="32" x2="12" y2="24" stroke="#7000FF" stroke-width="0.5" />
    
    <circle cx="48" cy="16" r="1.5" fill="#00F2FF" filter="url(#glow)" />
    <circle cx="16" cy="48" r="1.5" fill="#00F2FF" filter="url(#glow)" />
    <circle cx="52" cy="40" r="1.5" fill="#7000FF" filter="url(#glow)" />
    <circle cx="12" cy="24" r="1.5" fill="#7000FF" filter="url(#glow)" />
  </g>

  <!-- Central Eye/Core -->
  <circle cx="32" cy="32" r="8" fill="url(#coreGradient)" filter="url(#glow)" />
  <circle cx="32" cy="32" r="4" fill="white" fill-opacity="0.8">
    <animate attributeName="r" values="3.5;4.5;3.5" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Outer Floating Arcs -->
  <path d="M15 32 A17 17 0 0 1 32 15" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5" />
  <path d="M49 32 A17 17 0 0 1 32 49" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5" />
</svg>
